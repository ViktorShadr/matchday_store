name: Verify Backup Restore

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  restore-verify:
    name: Download, restore, and verify latest S3 backup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: verify_db
          POSTGRES_USER: verify_user
          POSTGRES_PASSWORD: verify_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download latest backup from S3
        run: |
          LATEST=$(aws s3 ls "s3://${{ secrets.BACKUP_S3_BUCKET }}/daily/" \
            --recursive | sort | tail -n 1 | awk '{print $4}')
          echo "Latest backup: $LATEST"
          aws s3 cp "s3://${{ secrets.BACKUP_S3_BUCKET }}/$LATEST" /tmp/backup.sql.gz
          echo "BACKUP_FILE=/tmp/backup.sql.gz" >> "$GITHUB_ENV"

      - name: Restore backup
        env:
          PGPASSWORD: verify_pass
        run: |
          gunzip -c "$BACKUP_FILE" | psql -h localhost -U verify_user -d verify_db

      - name: Run restore verification
        env:
          DATABASE_URL: postgres://verify_user:verify_pass@localhost:5432/verify_db
        run: bash ops/db/restore_verify.sh
