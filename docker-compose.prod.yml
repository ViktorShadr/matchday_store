x-prometheus-multiproc: &prometheus-multiproc
  environment:
    PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
  volumes:
    - prometheus_multiproc:/tmp/prometheus_multiproc

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/auth/.htpasswd:/etc/nginx/.htpasswd:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    <<: *prometheus-multiproc
    image: ghcr.io/viktorshadr/matchday_store:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "7"
    env_file:
      - .env
    command: ["sh", "/app/docker/web-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
      - prometheus_multiproc:/tmp/prometheus_multiproc
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=2).status == 200 else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  db:
    image: postgres:16.13
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.7
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  worker:
    <<: *prometheus-multiproc
    image: ghcr.io/viktorshadr/matchday_store:latest
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "7"
    env_file:
      - .env
    user: "10001:10001"
    command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "default", "-E"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - prometheus_multiproc:/tmp/prometheus_multiproc

  email-worker:
    <<: *prometheus-multiproc
    image: ghcr.io/viktorshadr/matchday_store:latest
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "7"
    env_file:
      - .env
    user: "10001:10001"
    command:
      [
        "celery",
        "-A",
        "config",
        "worker",
        "-l",
        "info",
        "-Q",
        "email",
        "--concurrency=2",
        "--prefetch-multiplier=1",
        "-E",
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - prometheus_multiproc:/tmp/prometheus_multiproc

  beat:
    image: ghcr.io/viktorshadr/matchday_store:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "7"
    env_file:
      - .env
    user: "10001:10001"
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy

  celery-exporter:
    image: danihodovic/celery-exporter:0.10.6
    restart: unless-stopped
    environment:
      CE_BROKER_URL: "${CELERY_BROKER_URL}"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml

  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    volumes:
      - ./docker/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  static_data:
  media_data:
  prometheus_data:
  loki_data:
  grafana_data:
  prometheus_multiproc:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 100.96.10.0/24
