map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $scheme;
    https https;
}

map $request_method $post_limit_key {
    default "";
    POST $binary_remote_addr;
}

limit_req_zone $post_limit_key zone=checkout_post:10m rate=5r/m;
limit_req_zone $post_limit_key zone=auth_post:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    auth_basic "Restricted access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    client_max_body_size 10m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    set $web_upstream web:8000;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /healthz/ {
        auth_basic off;

        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /checkout/ {
        limit_req zone=checkout_post burst=3 nodelay;

        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }

    location = /users/login/ {
        limit_req zone=auth_post burst=5 nodelay;

        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }

    location = /users/registration/ {
        limit_req zone=auth_post burst=5 nodelay;

        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }

    location = /users/password-reset/ {
        limit_req zone=auth_post burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_redirect off;
    }
}
