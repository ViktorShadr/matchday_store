<!-- _head.html -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ФК «Шинник» — клубный магазин{% endblock %}</title>
    {% load static %}
    <meta name="description" content="{% block meta_description %}Клубный магазин ФК «Шинник»: атрибутика, форма, аксессуары и мерч для болельщиков. Официальная продукция с доставкой по России.{% endblock %}">
    <meta name="theme-color" content="#0a2a66">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'img/site.webmanifest' %}">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ request.build_absolute_uri|cut:'?' }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}ФК «Шинник» — клубный магазин{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Клубный магазин ФК «Шинник»: атрибутика, форма, аксессуары и мерч для болельщиков.{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="{% block og_image %}{{ request.scheme }}://{{ request.get_host }}{% static 'img/og-image.jpg' %}{% endblock %}">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:site_name" content="ФК «Шинник» — клубный магазин">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}ФК «Шинник» — клубный магазин{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Клубный магазин ФК «Шинник»: атрибутика, форма, аксессуары и мерч для болельщиков.{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ request.scheme }}://{{ request.get_host }}{% static 'img/og-image.jpg' %}{% endblock %}">

    <link href="{% static 'css/bootstrap.min.css' %}?v=2" rel="stylesheet">
    <link href="{% static 'css/base.css' %}?v=2" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
