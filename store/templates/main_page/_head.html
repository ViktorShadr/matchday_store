<!-- _head.html -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ФК «Шинник» — клубный магазин{% endblock %}</title>
    {% load static %}
    <meta name="description" content="Клубный магазин ФК «Шинник»: атрибутика, форма, аксессуары и мерч для болельщиков.">
    <meta name="theme-color" content="#0a2a66">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
