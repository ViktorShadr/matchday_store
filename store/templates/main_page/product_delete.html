{% extends 'main_page/base.html' %}
{% block title %}Удаление товара{% endblock %}

{% block content %}
    <section class="sf-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-7">
                    <div class="sf-surface p-4">
                        <h1 class="sf-section-title mb-3">Удалить "{{ product.name }}"?</h1>
                        <p class="text-muted">Это действие удалит товар из каталога.</p>

                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Удалить</button>
                            <a class="btn btn-outline-primary" href="{% url 'store:product_detail' product.pk %}">Отмена</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
