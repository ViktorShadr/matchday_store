{% extends 'main_page/base.html' %}
{% block title %}Редактирование товара{% endblock %}

{% block content %}
    <section class="sf-section">
        <div class="container">
            <div class="sf-section-head">
                <h1 class="sf-section-title">Редактирование товара</h1>
                <a class="sf-link" href="{% url 'store:product_detail' product.pk %}">Назад к товару</a>
            </div>

            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">
                    <div class="sf-surface p-4">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
