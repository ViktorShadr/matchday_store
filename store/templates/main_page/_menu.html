<!-- _menu.html -->
{% load static %}
<nav class="sf-nav navbar navbar-expand-lg navbar-light">
    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sfNavbar"
                aria-controls="sfNavbar" aria-expanded="false" aria-label="Открыть меню">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="sfNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'base' %}active{% endif %}"
                       href="{% if request.resolver_match.url_name == 'base' %}#catalog{% else %}{% url 'store:base' %}#catalog{% endif %}">Каталог</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% if request.resolver_match.url_name == 'base' %}#categories{% else %}{% url 'store:base' %}#categories{% endif %}">Категории</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% if request.resolver_match.url_name == 'base' %}#popular{% else %}{% url 'store:base' %}#popular{% endif %}">Популярное</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% if request.resolver_match.url_name == 'base' %}#about{% else %}{% url 'store:base' %}#about{% endif %}">О клубе</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% if request.resolver_match.url_name == 'base' %}#contacts{% else %}{% url 'store:base' %}#contacts{% endif %}">Контакты</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}"
                       href="{% url 'store:product_list' %}">Все товары</a>
                </li>

                {% if navigation_permissions.is_moderator %}
                    <li class="nav-item mt-2 mt-lg-0">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard_home' or request.resolver_match.url_name == 'warehouse_dashboard' %}active{% endif %}"
                           href="{% url 'store:dashboard_home' %}">Дашборд</a>
                    </li>
                {% endif %}

                {% if user.is_authenticated and user.is_staff %}
                    <li class="nav-item mt-2 mt-lg-0">
                        <a class="nav-link" href="/admin/">Админ-панель</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
