<!-- _header.html -->
{% load static %}
<header class="sf-header">
    <div class="container">
        <div class="sf-header-row">
            <a class="sf-logo d-flex align-items-center gap-2" href="{% url 'main_page:base' %}">
                <img src="{% static 'img/favicon.ico' %}" alt="Шинник" loading="lazy">
                <div class="d-flex flex-column lh-1">
                    <span class="sf-logo-title">ФК «Шинник»</span>
                    <span class="sf-logo-subtitle">Клубный магазин атрибутики</span>
                </div>
            </a>

            <div class="sf-actions">
                <div class="sf-search">
                    <form class="sf-search-wrap" action="{% url 'main_page:product_list' %}" method="get" role="search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                        </svg>
                        <input type="search" name="q" class="form-control" placeholder="Поиск по товарам…">
                    </form>
                </div>

                <a href="{% url 'main_page:cart' %}" class="sf-icon-btn" aria-label="Корзина" title="Корзина">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 6h15l-1.5 9h-12z"></path>
                        <path d="M6 6l-2 0"></path>
                        <circle cx="9" cy="20" r="1"></circle>
                        <circle cx="18" cy="20" r="1"></circle>
                    </svg>
                    <span class="d-none d-lg-inline fw-bold">Корзина</span>
                    <span class="sf-badge cart-counter">{{ cart_count|default:0 }}</span>
                </a>

                {% if user.is_authenticated %}
                    <div class="dropdown">
                        <button class="sf-icon-btn dropdown-toggle" type="button" id="profileDropdown" 
                                data-bs-toggle="dropdown" aria-expanded="false" aria-label="Профиль">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}"
                                     alt="avatar"
                                     loading="lazy"
                                     style="width:18px;height:18px;border-radius:8px;object-fit:cover;">
                            {% else %}
                                <img src="{% static 'img/default_avatar.png' %}"
                                     alt="avatar"
                                     loading="lazy"
                                     style="width:18px;height:18px;border-radius:8px;object-fit:cover;">
                            {% endif %}
                            <span class="d-none d-lg-inline fw-bold text-truncate" style="max-width:120px;">
                                {{ user.email }}
                            </span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" 
                                   href="{% url 'users:profile_detail' pk=user.pk %}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    Профиль
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2"
                                   href="{% url 'users:order_list' %}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 11l3 3L22 4"></path>
                                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                                    </svg>
                                    Мои заказы
                                </a>
                            </li>
                            {% if navigation_permissions.is_moderator %}
                                <li>
                                    <a class="dropdown-item d-flex align-items-center gap-2"
                                       href="{% url 'store:dashboard_home' %}">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="3" y="3" width="7" height="9"></rect>
                                            <rect x="14" y="3" width="7" height="5"></rect>
                                            <rect x="14" y="12" width="7" height="9"></rect>
                                            <rect x="3" y="16" width="7" height="5"></rect>
                                        </svg>
                                        Дашборд
                                    </a>
                                </li>
                            {% endif %}
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form method="post" action="{% url 'users:logout' %}" style="display: inline;">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item d-flex align-items-center gap-2 w-100 border-0 bg-transparent text-start">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                            <polyline points="16 17 21 12 16 7"></polyline>
                                            <line x1="21" y1="12" x2="9" y2="12"></line>
                                        </svg>
                                        Выйти
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                {% else %}
                    <a class="sf-icon-btn" href="{% url 'users:login' %}" aria-label="Вход">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <path d="M10 17l5-5-5-5"></path>
                            <path d="M15 12H3"></path>
                        </svg>
                        <span class="d-none d-lg-inline fw-bold">Вход</span>
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</header>
